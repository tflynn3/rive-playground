<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Future Table</title>
  <script src="./shared.js"></script>
  <style>
    :root {
      --bg: #061019;
      --line: rgba(116,216,255,.16);
      --text: #eef7fb;
      --muted: #93acba;
      --cyan: #74d8ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "IBM Plex Mono", Consolas, "SFMono-Regular", Menlo, monospace; color: var(--text); background: radial-gradient(circle at top, rgba(116,216,255,.07), transparent 32%), linear-gradient(180deg, #091521, #050c13); }
    .shell { width: min(1380px, calc(100vw - 28px)); margin: 0 auto; padding: 22px 0 24px; }
    .page-header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
    .eyebrow { color: #7cdcff; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 6px 0 8px; font-size: clamp(2rem, 3vw, 3rem); }
    p { margin: 0; max-width: 820px; color: var(--muted); line-height: 1.55; }
    .back-link { color: #dff7ff; text-decoration: none; border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px; background: rgba(255,255,255,.03); }
    .scene {
      position: relative;
      min-height: 820px;
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(rgba(116,216,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116,216,255,.03) 1px, transparent 1px),
        radial-gradient(circle at top, rgba(116,216,255,.06), transparent 34%),
        #071019;
      background-size: 44px 44px, 44px 44px, auto, auto;
    }
    .summary {
      position: absolute;
      left: 24px;
      right: 24px;
      top: 18px;
      display: flex;
      gap: 14px;
      z-index: 3;
    }
    .summary-card {
      min-width: 160px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(8,18,28,.82);
      border: 1px solid rgba(116,216,255,.14);
      color: var(--muted);
      font-size: .78rem;
    }
    .summary-card strong { display: block; margin-top: 4px; font-size: 1.04rem; color: #eef8fc; }
    .table-shell {
      position: absolute;
      inset: 96px 34px 28px;
      border-radius: 28px;
      background: rgba(7,17,26,.84);
      border: 1px solid rgba(116,216,255,.16);
      box-shadow: 0 30px 42px rgba(0,0,0,.34);
      overflow: hidden;
    }
    .header, .row {
      display: grid;
      grid-template-columns: 230px 110px 110px 120px 110px 110px 120px 120px 1fr;
      gap: 0;
      align-items: center;
    }
    .header {
      padding: 16px 18px;
      background: rgba(10,24,36,.92);
      border-bottom: 1px solid rgba(116,216,255,.12);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .72rem;
      color: #9eb6c5;
    }
    .rows { display: grid; }
    .row {
      position: relative;
      min-height: 76px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(116,216,255,.08);
      overflow: hidden;
      background: linear-gradient(90deg, rgba(255,255,255,.01), transparent 40%);
    }
    .row::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(116,216,255,.06), transparent);
      transform: translateX(-120%);
      animation: rowScan 7.4s linear infinite;
      pointer-events: none;
    }
    .row.deploying::before { animation-duration: 3.4s; background: linear-gradient(90deg, transparent, rgba(116,216,255,.14), transparent); }
    .row.critical::before { display: none; }
    .row.critical::after { content: ""; position: absolute; inset: 0 auto 0 0; width: 6px; background: linear-gradient(180deg, rgba(255,93,103,.16), rgba(255,93,103,.88), rgba(255,93,103,.16)); }
    .row.degraded { background: linear-gradient(90deg, rgba(255,191,95,.05), transparent 42%); }
    .row.scaling { background: linear-gradient(90deg, rgba(214,247,255,.04), transparent 42%); }
    .service-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .service-dot { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 16px currentColor; color: var(--accent); background: var(--accent); flex: 0 0 auto; }
    .service-name { font-size: .92rem; color: #eef8fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .service-sub { font-size: .72rem; color: var(--muted); margin-top: 4px; }
    .pill { display: inline-flex; align-items: center; justify-content: center; min-height: 28px; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(116,216,255,.12); background: rgba(255,255,255,.04); font-size: .74rem; color: #dcecf4; width: fit-content; }
    .metric { color: #eff8fc; font-size: .92rem; }
    .spark { position: relative; height: 30px; border-radius: 999px; background: rgba(255,255,255,.03); border: 1px solid rgba(116,216,255,.08); overflow: hidden; }
    .spark::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0 10%, rgba(255,255,255,.04) 10% 11%, transparent 11% 22%, rgba(255,255,255,.04) 22% 23%, transparent 23% 34%, rgba(255,255,255,.04) 34% 35%, transparent 35% 46%, rgba(255,255,255,.04) 46% 47%, transparent 47% 58%, rgba(255,255,255,.04) 58% 59%, transparent 59%); opacity: .56; }
    .spark-wave { position: absolute; left: 0; right: 0; top: 50%; height: 2px; transform: translateY(-50%); background: linear-gradient(90deg, transparent 0 6%, var(--accent) 6% 12%, transparent 12% 18%, var(--accent) 18% 24%, transparent 24% 30%, var(--accent) 30% 38%, transparent 38% 46%, var(--accent) 46% 54%, transparent 54% 62%, var(--accent) 62% 72%, transparent 72% 80%, var(--accent) 80% 90%, transparent 90%); animation: waveSlide 6.8s linear infinite; }
    .replicas { position: relative; display: flex; align-items: center; gap: 10px; }
    .replica-bar { position: relative; width: 68px; height: 10px; border-radius: 999px; background: rgba(255,255,255,.05); overflow: hidden; border: 1px solid rgba(116,216,255,.08); }
    .replica-fill { height: 100%; background: linear-gradient(90deg, rgba(104,246,199,.18), rgba(104,246,199,.92)); }
    .row.scaling .replica-fill { animation: grow 2.2s infinite ease-in-out; }
    .row.scaling .replicas::after { content: ""; position: absolute; right: -2px; top: -8px; width: 6px; height: 6px; border-radius: 50%; background: #d7f8ff; box-shadow: 0 0 12px rgba(215,248,255,.22); animation: particle 1.8s infinite ease-out; }
    @keyframes rowScan { from { transform: translateX(-120%); } to { transform: translateX(120%); } }
    @keyframes waveSlide { from { transform: translateX(-10%); } to { transform: translateX(10%); } }
    @keyframes grow { 0%,100% { width: 58%; } 50% { width: 86%; } }
    @keyframes particle { 0% { transform: translate(0,0) scale(.72); opacity: 0; } 18% { opacity: .96; } 100% { transform: translate(18px,-12px) scale(1); opacity: 0; } }
  </style>
</head>
<body>
  <div class="shell">
    <script>document.write(BreadthVis.cardHeader("Future Table", "A custom operational table from the near future: dense, tabular, sortable-feeling, but still animated and legible. This explores whether the information can feel alive without abandoning rows and columns."));</script>
    <div class="scene">
      <div class="summary">
        <div class="summary-card">Mesh slice<strong>west-prod</strong></div>
        <div class="summary-card">Active release<strong>v2.4.0</strong></div>
        <div class="summary-card">Table mode<strong>custom live view</strong></div>
      </div>
      <div class="table-shell">
        <div class="header">
          <div>Service</div><div>Domain</div><div>Health</div><div>Lifecycle</div><div>Latency</div><div>Traffic</div><div>Replicas</div><div>Release</div><div>Flow</div>
        </div>
        <div class="rows" id="rows"></div>
      </div>
    </div>
  </div>
  <script>
    const metrics = {
      edge: { latency: "22 ms", traffic: "320 rps", replicas: 4, release: "v2.4.0" },
      auth: { latency: "34 ms", traffic: "88 rps", replicas: 3, release: "v2.3.8" },
      api: { latency: "28 ms", traffic: "214 rps", replicas: 6, release: "v2.4.0" },
      billing: { latency: "41 ms", traffic: "104 rps", replicas: 9, release: "v2.3.2" },
      events: { latency: "18 ms", traffic: "410 rps", replicas: 5, release: "v2.3.9" },
      worker: { latency: "26 ms", traffic: "156 rps", replicas: 7, release: "v2.3.7" },
      profile: { latency: "63 ms", traffic: "72 rps", replicas: 2, release: "v2.3.5" },
      analytics: { latency: "48 ms", traffic: "92 rps", replicas: 4, release: "v2.3.6" }
    };
    const rows = document.getElementById("rows");
    BreadthVis.services.forEach((service) => {
      const row = document.createElement("article");
      row.className = `row ${service.health} ${service.lifecycle}`;
      row.style.setProperty("--accent", BreadthVis.serviceAccent(service));
      row.innerHTML = `
        <div class="service-cell">
          <div class="service-dot"></div>
          <div>
            <div class="service-name">${service.label}</div>
            <div class="service-sub">${service.id}</div>
          </div>
        </div>
        <div><span class="pill">${service.domain}</span></div>
        <div><span class="pill">${service.health}</span></div>
        <div><span class="pill">${service.lifecycle}</span></div>
        <div class="metric">${metrics[service.id].latency}</div>
        <div class="metric">${metrics[service.id].traffic}</div>
        <div class="replicas">
          <div class="replica-bar"><div class="replica-fill" style="width:${Math.min(100, metrics[service.id].replicas * 11)}%"></div></div>
          <div class="metric">${metrics[service.id].replicas}</div>
        </div>
        <div class="metric">${metrics[service.id].release}</div>
        <div class="spark"><div class="spark-wave"></div></div>
      `;
      rows.appendChild(row);
    });
  </script>
</body>
</html>
