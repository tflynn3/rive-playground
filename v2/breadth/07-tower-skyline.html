<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tower Skyline</title>
  <script src="./shared.js"></script>
  <style>
    :root { --bg:#07111b; --line:rgba(116,216,255,.14); --text:#eef7fb; --muted:#9ab0bf; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family: Consolas, "SFMono-Regular", Menlo, monospace; color:var(--text); background: linear-gradient(180deg, #091521, #050c13); }
    .shell { width:min(1320px, calc(100vw - 28px)); margin:0 auto; padding:22px 0 24px; }
    .page-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:18px; }
    .eyebrow { color:#7cdcff; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:6px 0 8px; font-size:clamp(2rem, 3vw, 3rem); }
    p { margin:0; max-width:760px; color:var(--muted); line-height:1.55; }
    .back-link { color:#dff7ff; text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:10px 14px; background:rgba(255,255,255,.03); }
    .scene { position:relative; min-height:760px; border-radius:30px; overflow:hidden; border:1px solid var(--line); background: linear-gradient(180deg, rgba(117,216,255,.06), transparent 28%), radial-gradient(circle at bottom, rgba(90,255,201,.07), transparent 38%), #061019; }
    .scene::before { content:""; position:absolute; inset:auto 0 0; height:180px; background: linear-gradient(180deg, transparent, rgba(11, 22, 31, 0.96)); }
    svg { position:absolute; inset:0; width:100%; height:100%; }
    .sky-link { fill:none; stroke:rgba(116,216,255,.16); stroke-width:2; stroke-dasharray:10 16; animation: stream 8s linear infinite; }
    .towers { position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:space-evenly; padding:120px 54px 76px; gap:16px; }
    .tower { position:relative; width:132px; display:grid; justify-items:center; gap:10px; }
    .tower-label { font-size:12px; color:#e8f5fb; }
    .shaft { position:relative; width:92px; border-radius:24px 24px 10px 10px; background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02)), rgba(7, 17, 28, 0.92); border:1px solid rgba(116,216,255,.14); box-shadow:0 20px 28px rgba(0,0,0,.28); overflow:hidden; }
    .cap { position:absolute; left:50%; top:-14px; width:24px; height:24px; margin-left:-12px; border-radius:50%; box-shadow:0 0 16px currentColor; }
    .windows { position:absolute; inset:16px 18px 16px; background: repeating-linear-gradient(180deg, rgba(255,255,255,.08) 0 6px, transparent 6px 18px), repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 10px, transparent 10px 22px); opacity:.52; }
    .tower.deploying .spinner { position:absolute; left:50%; top:18px; width:64px; height:64px; margin-left:-32px; border-radius:50%; border:2px dashed #74d8ff; animation: spin 8s linear infinite; }
    .tower.scaling .ghost { position:absolute; left:50%; top:24px; width:100px; height:calc(100% - 24px); margin-left:-50px; border-radius:28px 28px 12px 12px; border:2px solid rgba(214,247,255,.68); animation: ghost 2.6s infinite ease-in-out; }
    .tower.critical .shaft { border-color: rgba(255,93,103,.36); box-shadow:0 0 0 1px rgba(255,93,103,.16), 0 20px 28px rgba(0,0,0,.3); }
    @keyframes stream { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -56; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes ghost { 0%,100% { transform: translateX(-50%) scaleY(.94); opacity:.44; } 50% { transform: translateX(-50%) scaleY(1.04); opacity:.96; } }
  </style>
</head>
<body>
  <div class="shell">
    <script>document.write(BreadthVis.cardHeader("Tower Skyline", "Services are skyline towers rather than nodes. Height, beacons, and ring behavior turn the system into an animated city instead of a mesh diagram."));</script>
    <div class="scene">
      <svg viewBox="0 0 1280 760" id="sky"></svg>
      <div class="towers" id="towers"></div>
    </div>
  </div>
  <script>
    const heights = { edge: 360, auth: 280, api: 430, billing: 340, events: 300, worker: 320, profile: 240, analytics: 270 };
    const lanes = ["edge", "auth", "api", "billing", "events", "worker", "profile", "analytics"];
    const sky = document.getElementById("sky");
    const anchorX = lanes.map((_, index) => 110 + index * 150);
    for (let index = 0; index < lanes.length - 1; index += 1) {
      const x1 = anchorX[index];
      const x2 = anchorX[index + 1];
      sky.appendChild(BreadthVis.svg("path", { d: `M ${x1} ${220 + index * 18} C ${(x1 + x2) / 2} ${120 + index * 10}, ${(x1 + x2) / 2} ${120 + index * 10}, ${x2} ${200 + index * 14}`, class: "sky-link" }));
    }
    const towers = document.getElementById("towers");
    lanes.forEach((id) => {
      const service = BreadthVis.serviceMap[id];
      const tower = document.createElement("div");
      tower.className = `tower ${service.health} ${service.lifecycle}`;
      tower.innerHTML = `
        <div class="shaft" style="height:${heights[id]}px;">
          <div class="cap" style="background:${BreadthVis.serviceAccent(service)}; color:${BreadthVis.serviceAccent(service)};"></div>
          <div class="windows"></div>
          ${service.lifecycle === "deploying" ? `<div class="spinner"></div>` : ``}
          ${service.lifecycle === "scaling" ? `<div class="ghost"></div>` : ``}
        </div>
        <div class="tower-label">${service.label}</div>
      `;
      towers.appendChild(tower);
    });
  </script>
</body>
</html>
